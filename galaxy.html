<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Galaxy Visualizer — Galaxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style-galaxy.css">
</head>
<body>

<div class="scanline"></div>
<div id="cursor"><div id="cursor-inner"></div></div>
<div id="entry-overlay"></div>

<div id="ui">

  <header id="top-bar">
    <div id="top-left">
      <a href="index.html" id="home-link">
        <div id="logo">SGV<span class="logo-dot">.</span>SYS</div>
      </a>
      <div id="bios-tag">3D MUSIC EXPLORER</div>
    </div>
    <div id="top-center">
      <div id="search-wrap">
        <span class="prompt">&gt;_</span>
        <input type="text" id="search" placeholder="RECHERCHER UN ARTISTE" autocomplete="off" spellcheck="false">
        <div id="search-results"></div>
      </div>
    </div>
    <div id="top-right">
      <div class="stat-block">
        <div class="stat-val" id="stat-artists">—</div>
        <div class="stat-lbl">ARTISTES</div>
      </div>
      <div class="stat-sep">//</div>
      <div class="stat-block">
        <div class="stat-val" id="stat-tracks">—</div>
        <div class="stat-lbl">TITRES</div>
      </div>
      <div class="stat-sep">//</div>
      <a href="explore.html" style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,255,159,0.4);text-decoration:none;transition:color .15s;white-space:nowrap;padding:0;" onmouseover="this.style.color='#00ff9f'" onmouseout="this.style.color='rgba(0,255,159,0.4)'">EXPLORER</a>
      <div class="stat-sep">//</div>
      <a href="index.html" style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(0,255,159,0.4);text-decoration:none;transition:color .15s;white-space:nowrap;padding:0;" onmouseover="this.style.color='#00ff9f'" onmouseout="this.style.color='rgba(0,255,159,0.4)'">⌂</a>
    </div>
  </header>

  <button id="back-btn" onclick="backToGalaxy()">
    <span class="btn-bracket">[</span> ← GALAXIE <span class="btn-bracket">]</span>
  </button>



  <div id="artist-panel">
    <div id="artist-panel-inner">
      <div id="ap-genre"></div>
      <div id="ap-name"></div>
      <div id="ap-meta"></div>
    </div>
  </div>

  <div id="hint">DRAG · ZOOM · CLICK SUR UNE PLANÈTE</div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

</div>

<div id="tooltip">
  <div id="tt-header">
    <div id="tt-sig"></div>
    <div id="tt-status">SIGNAL</div>
  </div>
  <canvas id="tt-osc" width="280" height="72"></canvas>
  <div id="tt-footer">
    <div id="tt-artist"></div>
    <div id="tt-track"></div>
    <div id="tt-album"></div>
  </div>
</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async function() {

  const SUPABASE_URL = 'https://wsdpaxkjaykxuzexzjqp.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzZHBheGtqYXlreHV6ZXh6anFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2ODA3NzMsImV4cCI6MjA4OTI1Njc3M30.ZH8gM25abDmP2Mf0zFNBJvf6EU2uIH4Lb-2-kpdlR7I';

  function loadMain() {
    var s = document.createElement('script');
    s.src = 'main.js';
    document.body.appendChild(s);
  }

  // ── 1. Données en session (import tout frais) ──
  const raw = sessionStorage.getItem('sgv_data');
  if (raw) {
    try {
      window.MUSIC_DATA = JSON.parse(raw);
      sessionStorage.removeItem('sgv_data');
      loadMain();
      return;
    } catch(e) {}
  }

  // ── 2. Vérifier l'auth ──
  const { createClient } = supabase;
  const _sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data: { session } } = await _sb.auth.getSession();

  if (!session) {
    window.location.href = 'index.html';
    return;
  }

  // ── 3. Charger depuis Supabase ──
  const { data: galaxyRow } = await _sb
    .from('galaxies')
    .select('data')
    .eq('user_id', session.user.id)
    .maybeSingle();

  if (galaxyRow && galaxyRow.data && galaxyRow.data.length > 0) {
    window.MUSIC_DATA = galaxyRow.data;
    loadMain();
  } else {
    window.location.href = 'index.html';
  }

})();
</script>
<script>
window.addEventListener('load', () => {
  const o = document.getElementById('entry-overlay');
  o.style.opacity = '0';
  setTimeout(() => { o.style.display = 'none'; }, 700);
});
</script>
</body>
</html>
