<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIBLIO.SYS — Galaxie Musicale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- CRT scan line sweep -->
<div class="scanline"></div>

<!-- Custom cursor -->
<div id="cursor"></div>

<div id="ui">
  <div id="top-bar">
    <div id="logo">BIBLIO.SYS</div>
    <div id="stats-bar">
      <span id="stat-artists"></span>
      <span class="sep">//</span>
      <span id="stat-tracks"></span>
    </div>
    <div id="search-wrap">
      <input type="text" id="search" placeholder="RECHERCHER UN ARTISTE_" autocomplete="off" spellcheck="false">
      <div id="search-results"></div>
    </div>
  </div>

  <button id="back-btn" onclick="backToGalaxy()">GALAXIE</button>

  <div id="artist-info">
    <div id="artist-name"></div>
    <div id="artist-meta"></div>
  </div>

  <div id="hint">DRAG POUR PIVOTER &nbsp;·&nbsp; SCROLL POUR ZOOMER &nbsp;·&nbsp; CLIQUER UNE PLANÈTE</div>
</div>

<div id="tooltip">
  <div id="tt-color-bar"></div>
  <canvas id="tt-osc" width="260" height="80"></canvas>
  <div id="tt-body">
    <div id="tt-artist"></div>
    <div id="tt-track"></div>
    <div id="tt-album"></div>
  </div>
</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="data.js"></script>
<script src="main.js"></script>
</body>
</html>
